name: Repo update to Telegram

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      task:
        description: What should Codex write about?
        required: true
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: Artasov/orcestr-repo-notifier@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          telegram-bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          telegram-chat-id: "@orcestrdev"
          telegram-message-thread-id: "2"
          telegram-parse-mode: HTML
          custom-task: ${{ github.event.inputs.task }}
          mode: product
          language: en
          model: gpt-5.5
          effort: medium
          custom-prompt: |
            Write in English.

            Return only the final Telegram message text. Do not explain the format.

            These rules apply to automatic push updates and manual workflow tasks.
            Automatic updates should cover meaningful Orcestr Media Transcriber desktop app, transcription, media processing, UI, packaging, documentation, release, or workflow progress.

            For automatic push updates, output exactly ORCESTR_NOTIFY_SKIP only when the entire push is formatting-only: Ruff/Prettier autofix, import sorting, whitespace cleanup, generated file reformatting, or equivalent mechanical cleanup without semantic, configuration, documentation, workflow, dependency, or behavior changes.
            Do not skip meaningful CI/CD, release, packaging, dependency, documentation, security, privacy, API key handling, filesystem access, transcription, media conversion, desktop integration, or user interface changes.

            If many changes are one repeated type of work, group them into one concise bullet.

            Be concrete: name the affected layer, such as the FastAPI/Python backend, React/Vite frontend, Tauri desktop shell, FFmpeg/FFprobe media tooling, PyInstaller sidecar, or cross-platform release pipeline.
            For backend changes, name the job queue, API route, schema, transcription client, chunking or silence alignment, retry behavior, media conversion, output handling, or configuration when the context proves it.
            For frontend changes, name the file picker or drop zone, per-file queue and progress, output selection, transcript preview/copy/download flow, desktop API client, or UI component when the context proves it.
            For desktop and packaging changes, name the Tauri command or capability, Python sidecar, bundled FFmpeg tools, installer target, update/download flow, S3 artifact or manifest, or GitHub Release when the context proves it.
            If package.json, package-lock.json, pyproject.toml, uv.lock, Cargo.toml, Cargo.lock, tauri.conf.json, dependencies, scripts, release workflows, tags, or app versions changed, mention the exact dependency or synchronized app version changes visible in the diff.

            Do not infer security, privacy, compatibility, performance, or user-facing behavior that the diff does not prove.

            Avoid vague claims such as "better", "cleaner", "more robust", "polished", or "improved" unless the same bullet states exactly what changed.

            Use exactly this structure:
            First line: DEV UPDATE <b>Orcestr Media Transcriber</b>:

            For automatic push updates, second line: Stats: <commit_count> commits, +<added_lines>/-<deleted_lines> lines.
            Use the exact commit count and line counts from the Change Stats section in context.
            For manual workflow tasks, include the Stats line only if the task asks for change stats.

            Then 3-5 bullet lines. Every bullet line must start with "• ".

            Then one short closing line after a blank line.
            After the closing line, always add exactly this final link line:
            Product: https://orcestr.com/media-transcriber

            If the push contains an app release or version bump, make the first bullet start with "• New release:" and state the exact version visible in the diff. Mention the affected Windows, macOS, or Linux artifacts only when the context proves them.

            The closing line may be a concise thank-you, a note for users, or a relevant invitation to try the app. Vary it between updates.
            Do not ask users to re-test, wait for a future fix, or perform follow-up work unless the manual task asks for it or the context proves it is required.
            Do not write filler such as "No visible app behavior changed".

            Do not use Markdown headings, code fences, numbered lists, or plain paragraph lines for update items.

            Telegram HTML parse mode is enabled. Use <b>...</b> sparingly for the product name and 1-2 important features or release versions.
            Do not use unsupported HTML tags, colors, spans, inline styles, or raw angle-bracket placeholders.

            Do not include repository owner, repository name, branch name, author name, commit hashes, raw file lists, compare links, or GitHub URLs.

            Keep every bullet concise, factual, and readable in Telegram.
